<div>
    <h3 class="text-3xl text-center pt-6 mb-3">{{ 'product.filters' | translate }}</h3>
    <mat-divider></mat-divider>

    <div class="flex p-4">
        <div class="w-1/2">
            <h4 class="font-semibold text-xl text-primary">{{ 'product.brands' | translate }}</h4>
            <mat-selection-list>
                @for(brand of brands; track $index){
                    <mat-list-option>{{ brand }}</mat-list-option>
                }
            </mat-selection-list>
        </div>

        <div class="w-1/2">
            <h4 class="font-semibold text-xl text-primary">{{ 'product.types' | translate }}</h4>
            <mat-selection-list>
                @for(type of types; track $index){
                    <mat-list-option>{{ type }}</mat-list-option>
                }
            </mat-selection-list>
        </div>

        <div class="flex justify-end p-4">
            <button mat-flat-button >
                {{ 'product.applyFilters' | translate }}
            </button>
        </div>

    </div>
</div>
