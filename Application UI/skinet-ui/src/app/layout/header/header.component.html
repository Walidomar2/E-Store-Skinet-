<header class="shadow-md p-3 w-full">
    <div class="flex align-middle items-center justify-between mx-auto">
        <img src="images/logo.png" alt="app logo" class="max-h-16">

        <nav class="flex gap-3 my-2 uppercase text-2xl">
            <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}">{{ 'header.home' |
                translate }}</a>
            <a routerLink="/shop" routerLinkActive="active">{{ 'header.shop' | translate }}</a>
            <a routerLink="/contact" routerLinkActive="active">{{ 'header.contact' | translate }}</a>
        </nav>

        <div class="flex gap-3 align-middle">
            <a matBadge="5" matBadgeSize="large" class="cutom-badge mt-2 mr-2">
                <mat-icon>shopping_cart</mat-icon>
            </a>

            <button mat-stroked-button>{{ 'header.login' | translate }}</button>
            <button mat-stroked-button>{{ 'header.register' | translate }}</button>

            <!-- Language Switcher Dropdown -->
            <button mat-icon-button [matMenuTriggerFor]="languageMenu"
                [attr.aria-label]="'header.language' | translate">
                <mat-icon>language</mat-icon>
            </button>

            <mat-menu #languageMenu="matMenu">
                <button mat-menu-item (click)="changeLanguage('en')" [class.font-bold]="currentLanguage() === 'en'">
                    <span>English</span>
                </button>
                <button mat-menu-item (click)="changeLanguage('ar')" [class.font-bold]="currentLanguage() === 'ar'">
                    <span>العربية</span>
                </button>
            </mat-menu>

        </div>
    </div>
</header>
